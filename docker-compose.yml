version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database
      - db_data:/data
      # Mount built frontend static files
      - frontend_dist:/app/static:ro
    environment:
      DATABASE_URL: sqlite:////data/gmail_lead_sync.db
      STATIC_FILES_DIR: /app/static
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      LOG_LEVEL: INFO
      # Required secrets - set these in .env or environment
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  db_data:
  frontend_dist:
